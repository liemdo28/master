name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create minimal keys.json
        run: |
          echo '{"activeProviders":[],"mode":"fallback","providers":{}}' > keys.json

      - name: Start gateway
        run: |
          PORT=3456 NODE_ENV=test node dist/server.js &
          echo "GW_PID=$!" >> $GITHUB_ENV
          sleep 4

      - name: Health check
        run: |
          curl -sf http://127.0.0.1:3456/health | grep -q '"status":"ok"'
          echo "Health check passed"

      - name: Models endpoint
        run: |
          curl -sf http://127.0.0.1:3456/v1/models | grep -q '"object":"list"'
          echo "Models endpoint passed"

      - name: Stop gateway
        if: always()
        run: kill $GW_PID || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t antigravity-gateway:ci .

      - name: Test Docker image
        run: |
          mkdir -p /tmp/gw-data
          echo '{"activeProviders":[],"mode":"fallback","providers":{}}' > /tmp/gw-data/keys.json

          docker run -d \
            --name gw-test \
            -p 3456:3456 \
            -v /tmp/gw-data:/app/data \
            antigravity-gateway:ci

          sleep 8

          curl -sf http://127.0.0.1:3456/health | grep -q '"status":"ok"'
          echo "Docker smoke test passed"

          docker stop gw-test
          docker rm gw-test
