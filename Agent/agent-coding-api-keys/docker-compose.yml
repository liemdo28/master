version: "3.9"

services:
  gateway:
    build:
      context: .
      target: production
    image: antigravity-gateway:latest
    container_name: antigravity-gateway
    restart: unless-stopped
    ports:
      - "3456:3456"
    volumes:
      - ./data:/app/data
      - ./gateway.log:/app/gateway.log
    environment:
      PORT: "3456"
      HOST: "0.0.0.0"
      NODE_ENV: production
      CONFIG_PATH: /app/data/keys.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3456/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
