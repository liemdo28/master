<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent OS — CEO Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f12;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #7c6ff7;
      --accent2: #5b5bd6;
      --green: #3dd68c;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e2ef;
      --muted: #6b6b80;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 250px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      gap: 20px;
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo::before { content: '⬡'; font-size: 20px; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .worker-list { display: flex; flex-direction: column; gap: 4px; }
    .worker-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 9px; border-radius: 8px;
      font-size: 13px; cursor: pointer;
      transition: background 0.1s;
    }
    .worker-row:hover { background: var(--surface2); }

    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.online  { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .dot.busy    { background: var(--yellow); }
    .dot.offline { background: var(--muted); }

    .worker-name { flex: 1; }
    .worker-lvl {
      font-size: 10px; padding: 1px 5px; border-radius: 4px;
      background: var(--surface2); color: var(--muted);
    }

    .quick-list { display: flex; flex-direction: column; gap: 5px; }
    .qbtn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 7px 10px; border-radius: 8px;
      font-size: 12px; cursor: pointer; text-align: left;
      transition: all 0.1s;
    }
    .qbtn:hover { background: var(--accent2); border-color: var(--accent); color: #fff; }

    .ws-status {
      font-size: 11px; color: var(--muted); display: flex;
      align-items: center; gap: 6px; margin-top: auto;
    }
    .ws-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .ws-dot.connected { background: var(--green); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .topbar-left .title { font-weight: 600; font-size: 15px; }
    .topbar-left .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .pills { display: flex; gap: 6px; }
    .pill {
      font-size: 11px; padding: 3px 9px; border-radius: 20px;
      border: 1px solid; display: flex; align-items: center; gap: 4px;
    }
    .pill.green  { border-color: var(--green);  color: var(--green); }
    .pill.yellow { border-color: var(--yellow); color: var(--yellow); }
    .pill.muted  { border-color: var(--border); color: var(--muted); }

    /* ── Chat ── */
    .chat { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 18px; }
    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: 10px; max-width: 800px; }
    .msg.ceo { align-self: flex-end; flex-direction: row-reverse; }

    .av {
      width: 34px; height: 34px; border-radius: 9px;
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 15px;
    }
    .av.agent { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); font-size: 17px; }
    .av.ceo   { background: var(--accent2); color: #fff; }

    .bubble-wrap {}
    .bubble-meta { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
    .bubble {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 14px;
      font-size: 14px; line-height: 1.55; max-width: 580px;
    }
    .msg.ceo .bubble { background: var(--accent2); border-color: var(--accent); }

    /* Task card */
    .task-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 13px; margin-top: 9px;
    }
    .tc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .tc-title { font-weight: 600; font-size: 13px; }
    .tc-status { font-size: 11px; color: var(--muted); }
    .tc-rows { display: flex; gap: 16px; flex-wrap: wrap; }
    .tc-field { font-size: 12px; color: var(--muted); }
    .tc-field span { color: var(--text); font-weight: 500; margin-left: 3px; }

    .tc-btns { display: flex; gap: 7px; margin-top: 10px; }
    .tc-btn {
      padding: 6px 16px; border-radius: 7px; font-size: 12px;
      font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .tc-btn:hover { opacity: 0.8; }
    .tc-btn.yes { background: var(--green); color: #000; }
    .tc-btn.no  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    /* Log block */
    .log-block {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 11.5px; background: #0a0a0d;
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 11px; margin-top: 9px;
      line-height: 1.65; max-height: 180px; overflow-y: auto;
    }
    .log-block::-webkit-scrollbar { width: 3px; }
    .log-block::-webkit-scrollbar-thumb { background: var(--border); }

    .l-ok   { color: var(--green); }
    .l-warn { color: var(--yellow); }
    .l-err  { color: var(--red); }
    .l-info { color: var(--muted); }
    .l-raw  { color: #8888aa; }

    .prog-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .prog-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width 0.3s ease; width: 0%;
    }

    /* Typing */
    .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .tdot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .tdot:nth-child(2) { animation-delay: 0.2s; }
    .tdot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

    /* ── Input ── */
    .input-wrap {
      padding: 14px 22px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-box {
      display: flex; align-items: flex-end; gap: 9px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px 12px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: var(--accent); }
    #inp {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 14px; resize: none;
      min-height: 21px; max-height: 110px; font-family: inherit; line-height: 1.5;
    }
    #inp::placeholder { color: var(--muted); }
    .send-btn {
      background: var(--accent); border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 7px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0; transition: background 0.1s;
    }
    .send-btn:hover { background: var(--accent2); }
    .input-hint { font-size: 11px; color: var(--muted); margin-top: 6px; padding-left: 2px; }

    /* Markdown bold */
    strong { font-weight: 700; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">Agent OS</div>

  <div>
    <div class="section-label">Workers</div>
    <div class="worker-list" id="worker-list">
      <div class="worker-row">
        <div class="dot offline"></div>
        <div class="worker-name">Đang tải...</div>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">Quick</div>
    <div class="quick-list">
      <button class="qbtn" onclick="qs('Audit Master')">🔍 Audit Master</button>
      <button class="qbtn" onclick="qs('Build Dashboard')">🔨 Build Dashboard</button>
      <button class="qbtn" onclick="qs('Run QA')">✅ Run QA</button>
      <button class="qbtn" onclick="qs('Git status Master')">📋 Git Status</button>
      <button class="qbtn" onclick="qs('Deploy staging')">🚀 Deploy Staging</button>
      <button class="qbtn" onclick="qs('Open Antigravity')">⚡ Open Antigravity</button>
    </div>
  </div>

  <div class="ws-status" id="ws-status">
    <div class="ws-dot" id="ws-dot"></div>
    <span id="ws-label">Đang kết nối...</span>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="title">CEO Command Interface</div>
      <div class="sub">Agent OS · <span id="worker-count">0</span> workers online</div>
    </div>
    <div class="pills">
      <div class="pill green" id="pill-online"><span>●</span> <span id="pill-online-count">0</span> Online</div>
      <div class="pill yellow" id="pill-busy"><span>◐</span> <span id="pill-busy-count">0</span> Busy</div>
      <div class="pill muted" id="pill-tasks">Tasks: <span id="pill-task-count">0</span></div>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-wrap">
    <div class="input-box">
      <textarea id="inp" placeholder="Ra lệnh cho Agent..." rows="1"
        onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
      <button class="send-btn" onclick="send()">↑</button>
    </div>
    <div class="input-hint">Enter gửi · Shift+Enter xuống dòng · Lệnh: Build · Audit · QA · Deploy · Git · Open</div>
  </div>
</div>

<script>
const SESSION_ID = 'ceo-' + Math.random().toString(36).slice(2, 8);
let ws = null;
let wsReady = false;
let taskCounter = 100;
const pendingApprovals = new Map(); // taskId → { logEl, progEl }

// ── WebSocket ──
function connectWS() {
  const url = `ws://${location.host}/ws`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    wsReady = true;
    setWsStatus(true);
    loadWorkers();
    loadStats();
  };

  ws.onclose = () => {
    wsReady = false;
    setWsStatus(false);
    setTimeout(connectWS, 3000);
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleWsMsg(msg);
    } catch {}
  };
}

function setWsStatus(ok) {
  document.getElementById('ws-dot').className = 'ws-dot' + (ok ? ' connected' : '');
  document.getElementById('ws-label').textContent = ok ? 'Đã kết nối' : 'Mất kết nối...';
}

function handleWsMsg(msg) {
  switch (msg.type) {
    case 'worker_update':
      loadWorkers();
      break;
    case 'task_created':
    case 'task_update':
      loadStats();
      break;
    case 'log':
      appendLog(msg.taskId, msg.log?.level ?? 'info', msg.log?.message ?? '');
      break;
    case 'chat_message':
      if (msg.payload?.role === 'system') {
        showAgentBubble(msg.payload.content, msg.payload.taskId);
      }
      break;
    case 'approval_required':
      showApprovalCard(msg.task_id, msg.task);
      break;
    case 'approval_decided':
      handleApprovalDecided(msg.task_id, msg.decision);
      break;
    case 'approval_resolved':
      if (msg.payload?.status === 'approved') handleApprovalDecided(msg.payload.taskId, 'approved');
      break;
  }
}

// ── API helpers ──
async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  return res.json();
}

async function loadWorkers() {
  const data = await api('GET', '/workers');
  const workers = data.workers ?? [];
  const list = document.getElementById('worker-list');
  list.innerHTML = workers.length
    ? workers.map(w => `
        <div class="worker-row">
          <div class="dot ${w.status === 'online' ? 'online' : w.status === 'busy' ? 'busy' : 'offline'}"></div>
          <div class="worker-name">${w.name}</div>
          <div class="worker-lvl">L2</div>
        </div>`).join('')
    : '<div style="font-size:12px;color:var(--muted);padding:8px">Chưa có worker</div>';

  const online = workers.filter(w => w.status === 'online').length;
  const busy   = workers.filter(w => w.status === 'busy').length;
  document.getElementById('worker-count').textContent = online + busy;
  document.getElementById('pill-online-count').textContent = online;
  document.getElementById('pill-busy-count').textContent = busy;
}

async function loadStats() {
  const data = await api('GET', '/stats');
  const total = (data.pendingTasks ?? 0) + (data.runningTasks ?? 0);
  document.getElementById('pill-task-count').textContent = total;
}

// ── Send message ──
async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  resize(inp);

  addCeoMsg(text);

  // Typing indicator
  const typingEl = addTyping();

  try {
    const data = await api('POST', '/chat', { message: text });
    typingEl.remove();

    if (data.messages) {
      const sysMsg = data.messages.find(m => m.role === 'system');
      if (sysMsg) {
        const taskInfo = data.task;
        showAgentBubble(sysMsg.content, taskInfo?.id, taskInfo);
      }
    }
  } catch (err) {
    typingEl.remove();
    showAgentBubble('Lỗi kết nối: ' + err.message);
  }
}

// ── Render helpers ──
function addCeoMsg(text) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ceo';
  d.innerHTML = `<div class="av ceo">C</div><div class="bubble-wrap"><div class="bubble">${esc(text)}</div></div>`;
  chat.appendChild(d);
  scrollBot();
}

function showAgentBubble(content, taskId, taskInfo) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg';

  let inner = renderMd(content);

  if (taskInfo && taskInfo.status === 'waiting_approval') {
    inner += renderApprovalCard(taskId, taskInfo);
  } else if (taskId && taskInfo && taskInfo.status === 'pending') {
    inner += `<div class="log-block" id="log-${taskId}"></div><div class="prog-bar"><div class="prog-fill" id="pf-${taskId}"></div></div>`;
  }

  d.innerHTML = `<div class="av agent">⬡</div><div class="bubble-wrap"><div class="bubble-meta">Agent OS</div><div class="bubble">${inner}</div></div>`;
  chat.appendChild(d);
  scrollBot();

  if (taskId) {
    pendingApprovals.set(taskId, {
      logEl: document.getElementById(`log-${taskId}`),
      progEl: document.getElementById(`pf-${taskId}`),
    });
    // Subscribe to task logs via WS
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'subscribe', taskId }));
    }
  }
}

function showApprovalCard(taskId, task) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg';
  d.id = `approval-msg-${taskId}`;
  d.innerHTML = `
    <div class="av agent">⬡</div>
    <div class="bubble-wrap">
      <div class="bubble-meta">Agent OS · Cần duyệt</div>
      <div class="bubble">
        Task cần được CEO xác nhận.
        ${renderApprovalCard(taskId, task)}
      </div>
    </div>`;
  chat.appendChild(d);
  scrollBot();
}

function renderApprovalCard(taskId, task) {
  const shortId = (taskId ?? '').slice(-6);
  const type = task?.type ?? '?';
  const project = task?.project ?? '?';
  const worker = task?.worker ?? task?.riskLevel ?? '?';
  return `
    <div class="task-card" id="tc-${taskId}">
      <div class="tc-head">
        <div class="tc-title">Task #${shortId} — ${type}</div>
        <div class="tc-status" id="tcs-${taskId}">chờ duyệt</div>
      </div>
      <div class="tc-rows">
        <div class="tc-field">Project: <span>${project}</span></div>
        <div class="tc-field">Worker: <span>${worker}</span></div>
      </div>
      <div class="tc-btns" id="tcb-${taskId}">
        <button class="tc-btn yes" onclick="approveTask('${taskId}')">Xác nhận</button>
        <button class="tc-btn no"  onclick="cancelTask('${taskId}')">Huỷ</button>
      </div>
    </div>`;
}

function handleApprovalDecided(taskId, decision) {
  const btns = document.getElementById(`tcb-${taskId}`);
  const status = document.getElementById(`tcs-${taskId}`);
  if (btns) btns.innerHTML = `<span style="font-size:12px;color:${decision==='approved'?'var(--green)':'var(--muted)'}">${decision === 'approved' ? '✓ Đã duyệt · đang chạy' : '✗ Đã huỷ'}</span>`;
  if (status) { status.textContent = decision; status.style.color = decision === 'approved' ? 'var(--green)' : 'var(--muted)'; }

  if (decision === 'approved' && !document.getElementById(`log-${taskId}`)) {
    const card = document.getElementById(`tc-${taskId}`);
    if (card) {
      const logEl = document.createElement('div');
      logEl.className = 'log-block';
      logEl.id = `log-${taskId}`;
      const prog = document.createElement('div');
      prog.className = 'prog-bar';
      prog.innerHTML = `<div class="prog-fill" id="pf-${taskId}"></div>`;
      card.after(logEl, prog);
      pendingApprovals.set(taskId, { logEl, progEl: prog.querySelector('.prog-fill') });
    }
  }
}

async function approveTask(taskId) {
  const btns = document.getElementById(`tcb-${taskId}`);
  if (btns) btns.innerHTML = '<span style="font-size:12px;color:var(--muted)">Đang xử lý...</span>';
  try {
    await api('POST', '/chat/approve', { taskId });
  } catch (e) {
    // Also try via WS
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'task_approve', taskId }));
    }
  }
}

async function cancelTask(taskId) {
  const btns = document.getElementById(`tcb-${taskId}`);
  if (btns) btns.innerHTML = '<span style="font-size:12px;color:var(--muted)">Đang xử lý...</span>';
  try {
    await api('POST', '/chat/deny', { taskId });
  } catch (e) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'task_cancel', taskId }));
    }
  }
}

function appendLog(taskId, level, message) {
  const entry = pendingApprovals.get(taskId);
  if (!entry?.logEl) return;

  const line = document.createElement('div');
  line.className = `l-${level === 'ok' ? 'ok' : level === 'warn' ? 'warn' : level === 'error' ? 'err' : 'info'}`;
  line.textContent = `[${new Date().toLocaleTimeString('vi-VN')}] ${message}`;
  entry.logEl.appendChild(line);
  entry.logEl.scrollTop = entry.logEl.scrollHeight;

  // Animate progress bar
  if (entry.progEl) {
    const current = parseFloat(entry.progEl.style.width) || 0;
    if (current < 90) entry.progEl.style.width = (current + 5 + Math.random() * 5) + '%';
  }

  scrollBot();
}

function addTyping() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg';
  d.innerHTML = `<div class="av agent">⬡</div><div class="bubble"><div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>`;
  chat.appendChild(d);
  scrollBot();
  return d;
}

// ── Welcome message ──
function welcome() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg';
  d.innerHTML = `
    <div class="av agent">⬡</div>
    <div class="bubble-wrap">
      <div class="bubble-meta">Agent OS · hệ thống</div>
      <div class="bubble">
        Chào CEO. Hệ thống sẵn sàng.<br><br>
        Bạn có thể ra lệnh bằng tiếng Việt hoặc tiếng Anh.<br>
        Ví dụ: <strong>Audit Dashboard</strong> · <strong>Build Payroll</strong> · <strong>Run QA</strong>
      </div>
    </div>`;
  chat.appendChild(d);
}

// ── Utils ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function scrollBot() {
  const c = document.getElementById('chat');
  c.scrollTop = c.scrollHeight;
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMd(text) {
  return esc(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
}

function qs(text) {
  document.getElementById('inp').value = text;
  send();
}

// ── Init ──
welcome();
connectWS();
loadWorkers();
loadStats();
</script>
</body>
</html>
