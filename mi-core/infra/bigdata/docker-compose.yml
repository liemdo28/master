version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mi_bigdata}
      POSTGRES_USER: ${POSTGRES_USER:-mi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../server/migrations/bigdata:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mi_user} -d ${POSTGRES_DB:-mi_bigdata}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mi-bigdata

  minio:
    image: minio/minio:latest
    container_name: mi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mi_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_in_env}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mi-bigdata

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mi-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': >/dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mi-bigdata

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  mi-bigdata:
    driver: bridge
